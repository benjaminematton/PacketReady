name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to the same branch supersedes any in-flight run. The eval
# matrix is the slow path; killing the stale run keeps queue depth in check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: evals (lint + typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install eval packages (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          # Generators first; runners depends on it as a sibling editable install.
          pip install -e "./evals/generators[dev]"
          pip install -e "./evals/runners[dev]"

      - name: Lint (ruff)
        run: |
          ruff check evals/generators evals/runners

      - name: Typecheck (mypy)
        run: |
          mypy evals/generators/packetready_eval evals/runners/runners

      - name: Tests (pytest)
        # `check_against_baseline` (the 2 pp gate) is exercised by the unit
        # tests under runners/tests/test_run.py — no separate end-to-end gate
        # step here because CI doesn't bring the .NET extractor up. Once P3
        # commits real numbers and a hosted extractor exists, add a job that
        # runs `runners.run --check-against evals/results/baseline.json`.
        run: |
          pytest evals/generators/tests evals/runners/runners/tests -v

  api:
    name: api (.NET build + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore apps/api/PacketReady.slnx

      - name: Build
        run: dotnet build apps/api/PacketReady.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test apps/api/Tests/Tests.csproj --no-build --configuration Release --verbosity normal
