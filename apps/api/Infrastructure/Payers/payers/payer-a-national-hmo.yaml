# Payer A — National HMO. Defaults to the universal-4 required-doc set
# (license/dea/boardCert/malpractice) with $1M/$3M malpractice minimums and
# the ABMS umbrella as the only accepted board family. Matches what most
# commercial payers ask for in a credentialing packet.
#
# Schema: see PayerRequirement.cs. The loader's ValidateShape() enforces
# every required key — adding/removing fields here must happen alongside
# a record edit.
id: payer-a-national-hmo
name: Payer A — National HMO
malpractice:
  minimumPerOccurrence: 1000000   # $1M
  minimumAggregate: 3000000       # $3M
requiredDocuments:
  - license
  - dea
  - boardCert
  - malpractice
boardCertRequired: true
# ABMS member boards. The validator does a literal Ordinal string match
# (no umbrella → member-board lookup table yet — P5+ refinement), so the
# YAML enumerates the actual acronyms that appear on real certificates.
# This list covers the common P4 fixtures (ABIM, ABFM, ABEM) plus a few
# more frequent specialties. A board outside this list emits a Major
# "not on accepted list" Issue.
acceptedBoards:
  - ABMS
  - ABIM   # Internal Medicine
  - ABFM   # Family Medicine
  - ABEM   # Emergency Medicine
  - ABP    # Pediatrics
  - ABS    # Surgery
  - ABOG   # Obstetrics & Gynecology
  - ABA    # Anesthesiology
  - ABPN   # Psychiatry & Neurology
  - ABR    # Radiology
windowDays:
  malpracticeRenewal: 30
  licenseRenewal: 30
